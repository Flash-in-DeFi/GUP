version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gasless_offramp_db
    environment:
      POSTGRES_USER: offramp
      POSTGRES_PASSWORD: offramp_secret
      POSTGRES_DB: gasless_offramp
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gasless_offramp_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
